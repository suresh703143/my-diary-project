<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./Dedicatedpage.css">  
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">

</head>
  <body style="height: 100vh ;">

  <!-- Edit button hidden initially -->
 <div class="Post card p-4 shadow">
  <input id="title" class="form-control mb-3" type="text" disabled />
  <textarea id="desc" class="form-control" rows="6" disabled></textarea>

  <button id="editBtn" class="btn btn-warning mt-3" onclick="enableEdit()">Edit</button>

  <button id="saveBtn" class="btn btn-success mt-3 d-none" onclick="savePost()">Save</button>
</div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
 
<script>
const params = new URLSearchParams(window.location.search);
let postID = params.get("postID") || localStorage.getItem("viewPostID");

async function loadPost() {
  const res = await fetch(`http://localhost:3000/getSinglePost?postID=${postID}`);
  const post = await res.json();

  document.getElementById("title").value = post.postTitle;
  document.getElementById("desc").value = post.postDescription;
}

function enableEdit() {
  document.getElementById("title").disabled = false;
  document.getElementById("desc").disabled = false;

  document.getElementById("editBtn").classList.add("d-none");
  document.getElementById("saveBtn").classList.remove("d-none");
}

async function savePost() {
  const postTitle = document.getElementById("title").value;
  const postDescription = document.getElementById("desc").value;

  const res = await fetch(`http://localhost:3000/editPost/${postID}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ postTitle, postDescription })
  });

  if (res.status === 200) {
    alert("Post updated");
    window.location.href = "FeedPage.html";
  }
}

document.addEventListener("DOMContentLoaded", loadPost);
</script>

</body>
</html>
