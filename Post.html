<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="./Post.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="d-flex justify-content-center align-items-center" style="height: 100vh;">
   <form action="" style="width: 500px;" class="m-auto formDiv" id="postForm">
    <div class="mb-3">
  <label for="postTitle" class="form-label">Post Title</label>
  <input type="text" class="form-control" id="postTitle" placeholder="Title here" name="postTitle">
</div>
<div class="mb-3">
  <label for="dayDiscription" class="form-label">Describe your day</label>
  <textarea class="form-control" id="dayDiscription" rows="10" name="postDescription"></textarea>
</div>
<button type="submit" class="btn w-100" id="postbutton">Post my day</button>
   </form>
     <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

<script>
  const form = document.getElementById('postForm');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const userID = localStorage.getItem('userID');
    if (!userID) {
      alert('Please login before creating a post.');
      window.location.href = '/Login.html';
      return;
    }

    // Basic validation
    const title = document.getElementById('postTitle').value.trim();
    const desc = document.getElementById('dayDiscription').value.trim();
    if (!title) { alert('Please enter a title.'); return; }
    if (!desc) { alert('Please enter a description.'); return; }

    const formData = new URLSearchParams(new FormData(form));
    formData.append('userID', userID);

    try {
      const response = await fetch('http://localhost:3000/newPost', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData
      });

      const text = await response.text();
      alert(text);

      if (response.status == 200) {
        window.location.href = "/FeedPage.html";
      }
    } catch (err) {
      console.error('Create post error:', err);
      alert('Error creating post. Please try again later.');
    }
  });
  
  </script> 
</body>
</html>
