<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="./FeedPage.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  </head>
  <body>
  <div class="text-end p-2">
     <a class="btn btn-primary w-25" href="/Post.html">New Post</a> 
  <a class="btn btn-danger w-25" href="/Login.html">Log out</a>  
</div>
<div class="allPosts">
    <div class="Post">
         </div>
   
</div>

<script>
    async function fetchPosts() {
        // 1. Get the logged-in UserID from localStorage
        const userID = localStorage.getItem('userID');

        // 2. If no user is logged in, send them back to login
        if (!userID) {
            alert("Please login first");
            window.location.href = "/Login.html";
            return;
        }

        try {
            // 3. Fetch posts only for this user
            const response = await fetch(`http://localhost:3000/getMyPosts?userID=${userID}`);
            const posts = await response.json();

            const postContainer = document.querySelector('.allPosts');
            postContainer.innerHTML = ''; // Clear existing content

            if (!posts || posts.length === 0) {
                postContainer.innerHTML = '<p class="text-center mt-5">No posts found. Start writing!</p>';
                return;
            }

            // 4. Loop through posts and add them to the page
            posts.forEach(post => {
     const postDiv = document.createElement('div');
     postDiv.className = 'Post card mb-3 shadow-sm';
     postDiv.innerHTML = `
     <div class="card-body">
     <h5 class="card-title text-primary">${post.postTitle}</h5>
     <p class="text-muted small">
      ${new Date(post.createdAt).toLocaleString()}
     </p>
      <p class="card-text">${post.postDescription}</p>

     <button class="btn btn-primary btn-sm"
  onclick="viewPost(${post.ID})">
  View Post
</button>


    <button class="btn btn-danger btn-sm"
      onclick="deletePost(${post.ID})">
      Delete
    </button>
  </div>
`;

    postContainer.appendChild(postDiv);
});


        } catch (error) {
            console.error("Fetch Error:", error);
            alert("Could not load posts.");
        }
    }

     async function deletePost(postID) {
  console.log("Delete clicked:", postID);

  const response = await fetch(
    `http://localhost:3000/deletePost/${postID}`,
    { method: "DELETE" }
  );

  if (response.status === 200) {
    fetchPosts(); // refresh posts
  } else {
    alert("Delete failed");
  }
}



async function editPost(postID, oldTitle, oldDesc) {
  const newTitle = prompt("Edit Title:", oldTitle);
  if (newTitle === null) return;

  const newDesc = prompt("Edit Description:", oldDesc);
  if (newDesc === null) return;

  const response = await fetch(
    `http://localhost:3000/editPost/${postID}`,
    {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        postTitle: newTitle,
        postDescription: newDesc
      })
    }
  );

  if (response.status === 200) {
    fetchPosts(); // reload updated post
  } else {
    alert("Update failed");
  }
}


    // Run the function when the page loads
    document.addEventListener('DOMContentLoaded', fetchPosts);
</script>

<script>
function viewPost(postID) {
  // store selected post ID (kept for backwards compatibility)
  localStorage.setItem("viewPostID", postID);

  // go to dedicated page with postID query param
  window.location.href = `/Dedicatedpage.html?postID=${postID}`;
}
</script>

     <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
  </body>
</html>
