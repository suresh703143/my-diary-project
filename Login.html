<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./Login.css">  
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
  <body class="d-flex justify-content-center align-items-center  " style="height: 100vh;">
   <div class="card" style="width: 25rem;">
  <div class="logic-card card-body text-center">

    <h1 class="card-title">Welcome</h1>
    <p class="card-text">Please Login to Continue</p>
    <form action="" class="text-start " id="loginForm">
        <div class="mb-3">
  <label for="emailInput" class="form-label">Email address</label>
  <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" name="email">
</div>
 <div class="mb-3">
  <label for="passwordInput" class="form-label">Password</label>
  <input type="password" class="form-control" id="passwordInput" name="password">
</div>
<p>Don't have an account?  <a href="/registration.html">Register here</a></p>
<button type="submit" class="btn w-100 " id="Loginbutton" >Login</button>  
</form>
       <!-- <a href="FeedPage.html" class="btn w-100 " id="Loginbutton">Login</a> -->
  </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
<script>
  const form = document.getElementById('loginForm');
  form.addEventListener('submit',async (e) => {
    e.preventDefault();
    const formData = new URLSearchParams(new FormData(form));
    const response = await fetch('http://localhost:3000/userLogin', {
    method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded'
      },
      body: formData
  });
  console.log(response);
  let body = await response.json();
  console.log(body);
  if(response.status == 200)
  {
    localStorage.setItem('userID', body.userID);
    window.location.href = "/FeedPage.html";
  } 
  else {
    alert(body.message); // show error
  }
  });

  </script> 
</body>
</html>
